<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PadelArena</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #0a0e0f;
  --surface: #111618;
  --surface2: #1a2022;
  --border: #232c2e;
  --accent: #00e5a0;
  --accent2: #00b87a;
  --danger: #ff4757;
  --warning: #ffa502;
  --text: #e8f0ee;
  --text2: #7a9490;
  --text3: #4a6460;
  --radius: 12px;
  --radius-sm: 8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* TYPOGRAPHY */
h1, h2, h3, .brand {
  font-family: 'Bebas Neue', sans-serif;
  letter-spacing: 0.05em;
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ===================== LAYOUT ===================== */
.app { display: flex; flex-direction: column; min-height: 100vh; }

.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; height: 60px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
}

.brand-logo {
  display: flex; align-items: center; gap: 10px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px; letter-spacing: 0.1em;
  color: var(--accent);
}

.brand-logo .dot { color: var(--text2); font-size: 14px; margin-top: 2px; }

.topbar-right { display: flex; align-items: center; gap: 12px; }

.nav-tabs {
  display: flex; gap: 4px;
  background: var(--surface2);
  border-radius: 100px;
  padding: 4px;
}

.nav-tab {
  padding: 6px 16px;
  border: none; background: none;
  color: var(--text2);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 500;
  cursor: pointer;
  border-radius: 100px;
  transition: all 0.2s;
}

.nav-tab:hover { color: var(--text); }
.nav-tab.active { background: var(--accent); color: #000; font-weight: 600; }

.main { flex: 1; padding: 28px 24px; max-width: 900px; margin: 0 auto; width: 100%; }

/* ===================== AUTH ===================== */
.auth-screen {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg);
  position: relative; overflow: hidden;
}

.auth-bg {
  position: absolute; inset: 0;
  background: 
    radial-gradient(ellipse 600px 400px at 20% 50%, rgba(0,229,160,0.06) 0%, transparent 70%),
    radial-gradient(ellipse 400px 600px at 80% 30%, rgba(0,184,122,0.04) 0%, transparent 70%);
}

.auth-card {
  position: relative;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 48px 40px;
  width: 100%; max-width: 420px;
  box-shadow: 0 40px 80px rgba(0,0,0,0.4);
}

.auth-logo {
  text-align: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 52px;
  color: var(--accent);
  letter-spacing: 0.1em;
  margin-bottom: 8px;
}

.auth-sub {
  text-align: center;
  color: var(--text2);
  font-size: 14px;
  margin-bottom: 36px;
}

.auth-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  margin-bottom: 24px;
  color: var(--text);
}

.field { margin-bottom: 16px; }

.field label {
  display: block;
  font-size: 12px; font-weight: 600;
  color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.08em;
  margin-bottom: 6px;
}

.field input, .field select, .field textarea {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  outline: none;
  transition: border-color 0.2s;
}

.field input:focus, .field select:focus, .field textarea:focus {
  border-color: var(--accent);
}

.field select option { background: var(--surface2); }

/* ===================== BUTTONS ===================== */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 10px 20px;
  border: none; border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 600;
  cursor: pointer; transition: all 0.2s;
  text-decoration: none;
}

.btn-primary {
  background: var(--accent); color: #000;
}
.btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }

.btn-secondary {
  background: var(--surface2); color: var(--text);
  border: 1px solid var(--border);
}
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { opacity: 0.85; }

.btn-ghost { background: none; color: var(--text2); }
.btn-ghost:hover { color: var(--text); }

.btn-full { width: 100%; }
.btn-sm { padding: 6px 14px; font-size: 13px; }
.btn-lg { padding: 14px 28px; font-size: 16px; }

/* ===================== CARDS ===================== */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
}

.card-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px;
}

.card-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px; letter-spacing: 0.05em;
}

/* ===================== PAGE HEADER ===================== */
.page-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 28px; gap: 16px;
}

.page-title { font-size: 36px; color: var(--text); }
.page-sub { color: var(--text2); font-size: 14px; margin-top: 4px; }

/* ===================== PLAYER CARD ===================== */
.players-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 16px;
}

.player-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  transition: border-color 0.2s, transform 0.2s;

}

.player-card:hover { border-color: var(--accent); transform: translateY(-2px); }
.player-card.selected { border-color: var(--accent); background: rgba(0,229,160,0.05); }

.player-card-top {

}

.player-avatar {

.player-name { font-weight: 600; font-size: 15px; }
.player-meta { color: var(--text2); font-size: 13px; margin-top: 2px; }

.level-dots {

.level-dot {

.level-dot.active { background: var(--accent); }

}

.gender-badge.male { background: rgba(59,130,246,0.15); color: #60a5fa; }
.gender-badge.female { background: rgba(236,72,153,0.15); color: #f472b6; }
.gender-badge.other { background: rgba(168,85,247,0.15); color: #c084fc; }

/* ===================== TOURNAMENT CARD ===================== */
.tournament-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
  transition: border-color 0.2s;
}

.tournament-card:hover { border-color: var(--accent); }

.tournament-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 14px;
}

.tournament-name { font-family: 'Bebas Neue', sans-serif; font-size: 24px; }
.tournament-date { color: var(--text2); font-size: 13px; margin-top: 2px; }

.status-badge {
  font-size: 11px; font-weight: 600;
  padding: 4px 10px; border-radius: 100px;

}

.status-draft { background: rgba(122,148,144,0.15); color: var(--text2); }
.status-published { background: rgba(0,229,160,0.15); color: var(--accent); }

.tournament-meta {

  margin-bottom: 16px;
}

.meta-item {

  color: var(--text2); font-size: 13px;
}

.meta-icon { font-size: 16px; }

.tournament-actions { display: flex; gap: 8px; flex-wrap: wrap; }

/* ===================== MATCH CARD ===================== */

  border-radius: var(--radius-sm);

.match-teams {
  flex: 1; display: flex; align-items: center; gap: 12px;

.team {

}

.team-name { font-size: 13px; font-weight: 500; }
.team-name.winner { color: var(--accent); }

.vs-badge {
  background: var(--border); 
  color: var(--text3);
  font-size: 11px; font-weight: 700;
  padding: 4px 8px; border-radius: 6px;
  flex-shrink: 0;
}

.score-input {
  display: flex; align-items: center; gap: 8px;
  flex-shrink: 0;
}

.score-input input {

  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  text-align: center;
  color: var(--text);
  font-size: 16px; font-weight: 600;

}

.score-input input:focus { border-color: var(--accent); }
.score-sep { color: var(--text3); font-weight: 600; }

/* ===================== STATS ===================== */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 16px; margin-bottom: 28px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  text-align: center;
}

.stat-number {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 48px; color: var(--accent);
  line-height: 1;
}

.stat-label {
  color: var(--text2); font-size: 13px; margin-top: 4px;
  text-transform: uppercase; letter-spacing: 0.06em;
}

.win-rate-bar {
  height: 6px; background: var(--surface2);
  border-radius: 3px; margin: 8px 0 4px;
  overflow: hidden;
}

.win-rate-fill {
  height: 100%; background: var(--accent);
  border-radius: 3px; transition: width 0.6s ease;

/* ===================== MODAL ===================== */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000; padding: 20px;
  backdrop-filter: blur(4px);
}

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 32px;
  width: 100%; max-width: 560px;
  max-height: 90vh; overflow-y: auto;
  position: relative;
}

.modal-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px; margin-bottom: 24px;
}

.modal-close {
  position: absolute; top: 16px; right: 16px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 50%; width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--text2); font-size: 18px;
  transition: all 0.2s;
}

.modal-close:hover { color: var(--text); border-color: var(--accent); }

.modal-actions {
  display: flex; gap: 10px; margin-top: 24px; justify-content: flex-end;
}

/* ===================== MISC ===================== */
.divider {
  height: 1px; background: var(--border);
  margin: 24px 0;
}

.empty-state {
  text-align: center; padding: 60px 20px;
  color: var(--text2);
}

.empty-icon { font-size: 48px; margin-bottom: 16px; }
.empty-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; margin-bottom: 8px; color: var(--text); }
.empty-sub { font-size: 14px; margin-bottom: 24px; }

.alert {
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  font-size: 14px; margin-bottom: 16px;
}

.alert-error { background: rgba(255,71,87,0.1); color: var(--danger); border: 1px solid rgba(255,71,87,0.2); }
.alert-success { background: rgba(0,229,160,0.1); color: var(--accent); border: 1px solid rgba(0,229,160,0.2); }
.alert-info { background: rgba(122,148,144,0.1); color: var(--text2); border: 1px solid var(--border); }

.tag {
  display: inline-block;
  font-size: 11px; font-weight: 600;
  padding: 3px 10px; border-radius: 100px;
  background: var(--surface2); color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.06em;
}

.row { display: flex; gap: 16px; }
.row .field { flex: 1; }

.section-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px; color: var(--text2);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 14px;
}

.toggle-group {
  display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px;
}

.toggle-btn {
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: 100px;
  background: none; color: var(--text2);
  font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all 0.2s;
  font-family: 'DM Sans', sans-serif;
}

.toggle-btn:hover { border-color: var(--accent); color: var(--accent); }
.toggle-btn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }

.loader {
  display: inline-block; width: 16px; height: 16px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading-screen {
  display: flex; align-items: center; justify-content: center;
  min-height: 200px; color: var(--text2);
  flex-direction: column; gap: 16px;
}

.leaderboard { }
.lb-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}

.lb-rank {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px; width: 32px; text-align: center;
  color: var(--text2);
}

.lb-rank.gold { color: #ffd700; }
.lb-rank.silver { color: #c0c0c0; }
.lb-rank.bronze { color: #cd7f32; }

.lb-name { flex: 1; font-weight: 500; }
.lb-stats { color: var(--text2); font-size: 13px; text-align: right; }

/* responsive */
@media (max-width: 640px) {
  .topbar { padding: 0 16px; }
  .main { padding: 20px 16px; }

<script>
// =============================================
// SUPABASE CONFIG
// =============================================
const SUPABASE_URL = 'https://gntealgbcsutpmfqivoe.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdudGVhbGdiY3N1dHBtZnFpdm9lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNjY0MzEsImV4cCI6MjA4ODc0MjQzMX0.gvV0R_J_HsOCqAku9NlpytRY1pbtYTJoFI0C_CPcQ_s';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// =============================================
// STATE
// =============================================
let state = {
  user: null,
  page: 'tournaments', // tournaments | players | stats
  players: [],
  tournaments: [],
  loading: false,
  modal: null, // null | 'player' | 'tournament' | 'tournament-detail'
  editing: null,
  activeTournament: null,
  message: null,
};

// =============================================
// UTILS
// =============================================
function initials(name) {
  return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
}

function formatDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('es-ES', { day:'2-digit', month:'short', year:'numeric' });
}

function levelLabel(l) {
  const labels = ['','Iniciación','Básico','Intermedio','Avanzado','Pro'];
  return labels[l] || l;
}

function genderLabel(g) {
  return g === 'male' ? 'Hombre' : g === 'female' ? 'Mujer' : 'Otro';
}

function partnerModeLabel(m) {
  const labels = { fixed:'Compañero fijo', random:'Compañero aleatorio', balanced:'Compañero nivelado' };
  return labels[m] || m;
}

function opponentModeLabel(m) {
  const labels = { fixed:'Rivales fijos', random:'Rivales aleatorios', balanced:'Partidos nivelados' };
  return labels[m] || m;
}

function msg(text, type='info') {
  state.message = { text, type };
  render();
  setTimeout(() => { state.message = null; render(); }, 3500);
}

// =============================================
// TOURNAMENT GENERATION LOGIC
// =============================================
function generateMatches(players, matchesPerPlayer, partnerMode, opponentMode) {
  const n = players.length;
  if (n < 4) return [];
  
  const matches = [];
  const playCount = {};
  players.forEach(p => playCount[p.id] = 0);

  // Create pairs based on partner mode
  function makePairs(shuffled) {
    if (partnerMode === 'fixed') {
      // Fixed pairs: 0+1, 2+3, etc.
      const pairs = [];
      for (let i = 0; i < shuffled.length - 1; i += 2) {
        pairs.push([shuffled[i], shuffled[i+1]]);
      }
      return pairs;
    } else if (partnerMode === 'balanced') {
      // Balance by level: closest levels play together
      const sorted = [...shuffled].sort((a,b) => a.level - b.level);
      const pairs = [];
      for (let i = 0; i < sorted.length - 1; i += 2) {
        pairs.push([sorted[i], sorted[i+1]]);
      }
      return pairs;
    } else {
      // Random
      const shuffledLocal = [...shuffled].sort(() => Math.random() - 0.5);
      const pairs = [];
      for (let i = 0; i < shuffledLocal.length - 1; i += 2) {
        pairs.push([shuffledLocal[i], shuffledLocal[i+1]]);
      }
      return pairs;
    }
  }

  let round = 1;
  let attempts = 0;
  const maxMatches = Math.floor(n / 4) * matchesPerPlayer;

  while (matches.length < maxMatches && attempts < 200) {
    attempts++;
    const shuffled = [...players].sort(() => Math.random() - 0.5);
    const pairs = makePairs(shuffled);
    
    if (pairs.length < 2) break;
    
    // Create match between pair[0] vs pair[1]
    for (let i = 0; i < pairs.length - 1; i += 2) {
      if (matches.length >= maxMatches) break;
      const team1 = pairs[i];
      const team2 = pairs[i+1];
      
      if (opponentMode === 'balanced') {
        const t1avg = (team1[0].level + team1[1].level) / 2;
        const t2avg = (team2[0].level + team2[1].level) / 2;
        if (Math.abs(t1avg - t2avg) > 1.5) continue;
      }

      // Check play counts
      const all4 = [...team1, ...team2];
      const minPlays = Math.min(...all4.map(p => playCount[p.id]));
      if (minPlays >= matchesPerPlayer) continue;

      matches.push({
        round,
        player1a_id: team1[0].id,
        player1b_id: team1[1].id,
        player2a_id: team2[0].id,
        player2b_id: team2[1].id,
        _team1: team1,
        _team2: team2,
      });

      all4.forEach(p => playCount[p.id]++);
    }
    round++;
  }

  return matches;
}

// =============================================
// DATA FETCHERS
// =============================================
async function loadPlayers() {
  if (!state.user) return;
  const { data } = await db.from('players').select('*').eq('owner_id', state.user.id).order('full_name');

async function loadTournaments() {

  const { data } = await db.from('tournaments').select('*, tournament_players(count)').eq('owner_id', state.user.id).order('scheduled_date', { ascending: false });

async function loadTournamentDetail(id) {
  const { data: tournament } = await db.from('tournaments').select('*').eq('id', id).single();
  const { data: participants } = await db.from('tournament_players').select('*, players(*)').eq('tournament_id', id);
  const { data: matches } = await db.from('matches').select('*').eq('tournament_id', id).order('round');
  return { tournament, participants: participants || [], matches: matches || [] };
}

let selectedPlayers = new Set();

function togglePlayer(id) {
  if (selectedPlayers.has(id)) {
    selectedPlayers.delete(id);
    document.getElementById('sel-'+id)?.classList.remove('selected');
  } else {
    selectedPlayers.add(id);
    document.getElementById('sel-'+id)?.classList.add('selected');
  }
}

function selectPartner(v) {
  document.getElementById('t-partner').value = v;
  document.querySelectorAll('[data-partner]').forEach(b => b.classList.toggle('active', b.dataset.partner === v));
}

function selectOpponent(v) {
  document.getElementById('t-opponent').value = v;
  document.querySelectorAll('[data-opponent]').forEach(b => b.classList.toggle('active', b.dataset.opponent === v));
}

async function saveTournament() {
  const name = document.getElementById('t-name').value.trim();
  const date = document.getElementById('t-date').value;
  if (!name || !date) { msg('Nombre y fecha son obligatorios', 'error'); return; }
  if (selectedPlayers.size < 4) { msg('Añade al menos 4 jugadores', 'error'); return; }

  const tData = {
    name,
    scheduled_date: date,
    location: document.getElementById('t-location').value.trim() || null,
    matches_per_player: parseInt(document.getElementById('t-matches').value),
    partner_mode: document.getElementById('t-partner').value,
    opponent_mode: document.getElementById('t-opponent').value,
    owner_id: state.user.id,
  };

  const { data: t, error } = await db.from('tournaments').insert(tData).select().single();
  if (error) { msg(error.message, 'error'); return; }

  // Add participants
  const participants = [...selectedPlayers].map(pid => ({ tournament_id: t.id, player_id: pid }));
  await db.from('tournament_players').insert(participants);

  // Generate matches
  const playersInTournament = state.players.filter(p => selectedPlayers.has(p.id));
  const matches = generateMatches(playersInTournament, tData.matches_per_player, tData.partner_mode, tData.opponent_mode);
  
  if (matches.length > 0) {
    const matchData = matches.map(m => ({
      tournament_id: t.id,
      round: m.round,
      player1a_id: m.player1a_id,
      player1b_id: m.player1b_id,
      player2a_id: m.player2a_id,
      player2b_id: m.player2b_id,
    }));
    await db.from('matches').insert(matchData);
  }

  selectedPlayers.clear();
  await loadTournaments();
  closeModal();
  msg(`Torneo creado con ${matches.length} partidos ✓`, 'success');
}

async function publishTournament(id) {
  await db.from('tournaments').update({ status: 'published' }).eq('id', id);
  await loadTournaments();
  msg('Torneo publicado ✓', 'success');
  render();
}

async function finishTournament(id) {

function copyShareLink(token) {

function renderTournamentDetailModal() {
  const { tournament, participants, matches } = state.activeTournament;
  if (!tournament) return '';

  const playerMap = {};
  participants.forEach(tp => { if (tp.players) playerMap[tp.players.id] = tp.players; });

  const playerName = (id) => playerMap[id]?.full_name || 'Desconocido';
  const roundGroups = {};
  matches.forEach(m => {
    if (!roundGroups[m.round]) roundGroups[m.round] = [];
    roundGroups[m.round].push(m);
  });

  return `

<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px">
  <span class="tag">📅 ${formatDate(tournament.scheduled_date)}</span>

  <span class="tag">👥 ${participants.length} jugadores</span>
  <span class="tag">🎯 ${matches.length} partidos</span>
</div>

${Object.keys(roundGroups).length === 0 ? `
  <div class="alert alert-info">No se han generado partidos para este torneo.</div>
` : Object.entries(roundGroups).map(([round, rMatches]) => `
  <div class="section-title" style="margin-top:20px">Ronda ${round}</div>
  ${rMatches.map(m => {
    const t1won = m.winner_team === 1;
    const t2won = m.winner_team === 2;
    return `
  <div class="match-card">
    <div class="match-round">R${m.round}</div>
    <div class="match-teams">
      <div class="team">
        <div class="team-name ${t1won?'winner':''}">${playerName(m.player1a_id)}</div>
        <div class="team-name ${t1won?'winner':''}">${playerName(m.player1b_id)}</div>
      </div>
      <div class="vs-badge">VS</div>
      <div class="team" style="text-align:right">
        <div class="team-name ${t2won?'winner':''}">${playerName(m.player2a_id)}</div>
        <div class="team-name ${t2won?'winner':''}">${playerName(m.player2b_id)}</div>
      </div>
    </div>
    ${tournament.status !== 'draft' ? `
    <div class="score-input">
      <input type="number" id="s1-${m.id}" value="${m.score_team1??''}" placeholder="0" min="0" max="99" onchange="saveScore('${m.id}')" />
      <span class="score-sep">-</span>
      <input type="number" id="s2-${m.id}" value="${m.score_team2??''}" placeholder="0" min="0" max="99" onchange="saveScore('${m.id}')" />
    </div>` : ''}
  </div>`;
  }).join('')}
`).join('')}

<div class="modal-actions">
  <button class="btn btn-secondary" onclick="closeModal()">Cerrar</button>
  ${tournament.status === 'draft' ? `<button class="btn btn-primary" onclick="publishTournament('${tournament.id}');closeModal()">Publicar torneo</button>` : ''}
  ${tournament.status === 'published' ? `<button class="btn btn-secondary" onclick="copyShareLink('${tournament.share_token}')">📋 Compartir</button>` : ''}
</div>`;
}

async function saveScore(matchId) {
  const s1 = parseInt(document.getElementById('s1-'+matchId)?.value);
  const s2 = parseInt(document.getElementById('s2-'+matchId)?.value);
  if (isNaN(s1) || isNaN(s2)) return;
  
  const winner = s1 > s2 ? 1 : s2 > s1 ? 2 : null;
  await db.from('matches').update({ score_team1: s1, score_team2: s2, winner_team: winner, played_at: new Date().toISOString() }).eq('id', matchId);
}

    <div class="page-sub">Resumen de tu actividad</div>
  </div>
</div>

<div class="stats-grid">
  <div class="stat-card">
    <div class="stat-number">${players.length}</div>
    <div class="stat-label">Jugadores</div>
  </div>
  <div class="stat-card">
    <div class="stat-number">${tournaments.length}</div>
    <div class="stat-label">Torneos</div>
  </div>
  <div class="stat-card">
    <div class="stat-number">${published}</div>
    <div class="stat-label">En curso</div>
  </div>
  <div class="stat-card">
    <div class="stat-number">${finished}</div>
    <div class="stat-label">Finalizados</div>
  </div>
</div>

<div class="card" style="margin-bottom:20px">
  <div class="card-title" style="margin-bottom:16px">Distribución de niveles</div>
  ${[1,2,3,4,5].map(lvl => {
    const count = players.filter(p => p.level === lvl).length;
    const pct = players.length ? Math.round(count / players.length * 100) : 0;
    return `
    <div style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:13px;color:var(--text2)">Nivel ${lvl} — ${levelLabel(lvl)}</span>
        <span style="font-size:13px;font-weight:600">${count} jugadores</span>
      </div>
      <div class="win-rate-bar">
        <div class="win-rate-fill" style="width:${pct}%"></div>
      </div>
    </div>`;
  }).join('')}
</div>

<div class="card">
  <div class="card-title" style="margin-bottom:16px">Jugadores por género</div>
  <div class="stats-grid" style="grid-template-columns:repeat(3,1fr)">
    ${['male','female','other'].map(g => {
      const count = players.filter(p => p.gender === g).length;
      return `
      <div class="stat-card" style="padding:16px;text-align:center">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--accent)">${count}</div>
        <div style="color:var(--text2);font-size:12px;text-transform:uppercase;letter-spacing:0.06em">${genderLabel(g)}</div>
      </div>`;
    }).join('')}
  </div>
</div>`;
}

// =============================================
// MODAL RENDERER
// =============================================
function renderModal() {
  if (state.modal === 'loading') {
    return `<div class="modal-overlay"><div class="modal"><div class="loading-screen"><div class="loader"></div><span>Cargando...</span></div></div></div>`;
  }
  
  const contents = {
    player: renderPlayerModal,
    tournament: renderTournamentModal,
    'tournament-detail': renderTournamentDetailModal,
  };
  
  const content = contents[state.modal] ? contents[state.modal]() : '';
  return `
<div class="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    ${content}
  </div>
</div>`;
}

function handleOverlayClick(e) {
  if (e.target.classList.contains('modal-overlay')) closeModal();
}

function closeModal() {
  state.modal = null;
  state.editing = null;
  state.activeTournament = null;
  selectedPlayers.clear();
  render();
}

// =============================================
// ATTACH EVENTS
// =============================================
function attachEvents() {
  // nothing extra needed - using inline onclick
}

// =============================================
// AUTH LISTENER + INIT
// =============================================
db.auth.onAuthStateChange(async (event, session) => {
  state.user = session?.user || null;
  if (state.user) {
    await Promise.all([loadPlayers(), loadTournaments()]);
  }
  render();
});

// Check for shared tournament link
const urlParams = new URLSearchParams(window.location.search);
const shareToken = urlParams.get('t');
if (shareToken) {
  // Load shared tournament
  db.from('tournaments').select('*').eq('share_token', shareToken).single().then(({ data }) => {
    if (data) {
      state.activeTournament = data;
    }
  });
}

// Initial render
render();
</script>
</body>
</html>
